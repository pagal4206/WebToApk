{% extends "layout.html" %}
{% set body_class = "auth-page" %}

{% block body %}
<main class="auth-shell compact">

    <section class="auth-panel auth-panel-form">

        <div class="auth-header">
            <h1>Web to Apk</h1>
            <div class="eyebrow">Create Account</div>
            <h2>Register</h2>
            <p>Create your secure account to access dashboard.</p>
        </div>

        {% if error %}
        <div class="form-alert">{{ error }}</div>
        {% endif %}

        <form method="post" action="/register" class="auth-form">

            <label class="field">
                <span>Full Name</span>
                <input type="text" name="fullName" placeholder="Your name" maxlength="80" required>
            </label>

            <label class="field">
                <span>Email Address</span>
                <input type="email" name="email" placeholder="you@example.com" required>
            </label>

            <label class="field">
                <span>Password</span>
                <input type="password" name="password" placeholder="At least 8 characters" required>
            </label>

            <label class="field">
                <span>Confirm Password</span>
                <input type="password" name="confirmPassword" placeholder="Re-enter password" required>
            </label>

            <button type="submit" class="primary-button full-width">
                Create Account
            </button>
        </form>

        <p class="auth-switch">
            Already have an account?
            <a href="/login">Login</a>
        </p>

    </section>

</main>
{% endblock %}
