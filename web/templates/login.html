{% extends "layout.html" %}
{% set body_class = "auth-page" %}

{% block body %}
<main class="auth-shell">

    <section class="auth-panel auth-panel-form">

        <div class="auth-header">
            <h1>Web to Apk</h1>
            <div class="eyebrow">Welcome Back</div>
            <h2>Sign in</h2>
            <p>Use your registered email and password to open the dashboard.</p>
        </div>

        {% if error %}
        <div class="form-alert">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login" class="auth-form">
            <input type="hidden" name="next" value="{{ next_target or '' }}">

            <label class="field">
                <span>Email Address</span>
                <input type="email" name="email" value="{{ form_values.email or '' }}" placeholder="you@example.com" required>
            </label>

            <label class="field">
                <span>Password</span>
                <input type="password" name="password" placeholder="Enter your password" required>
            </label>

            <button type="submit" class="primary-button full-width">Login</button>
        </form>

        <p class="auth-switch">
            New here?
            <a href="/register">Create an account</a>
        </p>

    </section>

</main>
{% endblock %}
